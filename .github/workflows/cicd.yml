name: Web App Demo CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: |
          pip install flask pytest pytest-flask bandit

      - run: pytest -v

      - run: bandit -r .

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gp1-demo:latest ./gp1-demo/gp1-demo

      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/gp1-demo:latest
